version: 2

builds:
  - id: "scorebug"
    main: "./cmd/scorebug"
    binary: "scorebug"

    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    flags:
      - -trimpath
    ignore:
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w

archives:
  - formats: ['tar.gz']
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: ['zip']

changelog:
  disable: true

release:
  github:
    owner: KevinStirling
    name: scorebug.sh

homebrew_casks:
  - name: scorebug

    commit_author:
      name: KevinStirling
      email: youngks93@gmail.com

    homepage: "https://github.com/KevinStirling/scorebug.sh"
    description: "Live MLB scores in your terminal"
    license: "MIT"
    url:
      verified: github.com/KevinStirling/scorebug.sh

    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/scorebug"]
          end

    repository:
      owner: KevinStirling
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GORELEASER_AUTH_TOKEN }}"

scoops:
  - name: scorebug
    url_template: "https://github.com/KevinStirling/scorebug.sh/releases/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/KevinStirling/scorebug.sh"
    description: "Live MLB scores in your terminal"
    license: MIT
    skip_upload: auto
    persist:
      - "data"
      - "config.toml"
    pre_install: ["Write-Host 'Running preinstall command'"]
    post_install: ["Write-Host 'Running postinstall command'"]
    depends: ["git", "foo"]
    shortcuts: [["scorebug.exe", "scorebug"]]
    goamd64: v3

    repository:
      owner: KevinStirling
      name: scoop-bucket
      branch: main
      token: "{{ .Env.GORELEASER_AUTH_TOKEN }}"

    commit_author:
      name: goreleaserbot
      email: youngks93@gmail.com
      signing:
        enabled: false
